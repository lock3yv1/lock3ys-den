// ─── LOGIC ────────────────────────────────────────────────────────────────────
function calcFlip(buy, sell) {
  if (!sell) return { net:null, roi:null, fees:null };
  const fees = +(sell * EF).toFixed(2);
  const net  = +(sell - buy - fees - POST).toFixed(2);
  return { net, roi: buy > 0 ? Math.round(net / buy * 100) : null, fees };
}

function calcHold(sell, title) {
  if (!sell || !title) return null;
  const key = Object.keys(HOLD).find(k => title.toLowerCase().includes(k));
  if (!key) return null;
  const h = HOLD[key];
  const y1 = Math.round(sell * h.yr1);
  const y2 = Math.round(sell * h.yr2);
  const y3 = Math.round(sell * (h.yr3 || h.yr2 * h.yr2 / h.yr1));
  const y4 = Math.round(sell * (h.yr4 || h.yr2 * h.yr2 / sell));
  const n1 = +(y1 - sell - y1*EF - POST).toFixed(2);
  const n2 = +(y2 - sell - y2*EF - POST).toFixed(2);
  return { ...h, yr1val:y1, yr2val:y2, yr3val:y3, yr4val:y4,
    yr1net:n1, yr2net:n2,
    yr1roi:Math.round(n1/sell*100), yr2roi:Math.round(n2/sell*100),
    yr1pct:Math.round((h.yr1-1)*100), yr2pct:Math.round((h.yr2-1)*100),
    yr3pct:Math.round((y3/sell-1)*100), yr4pct:Math.round((y4/sell-1)*100) };
}

function getGradeKey(roi, hs=0) {
  if (roi===null) return hs>=8?"H":hs>=6?"H":"?";
  if (roi>=25) return "S";
  if (roi>=15) return "A";
  if (roi>=8)  return "B";
  // For marginal/negative ROI — hold score decides
  if (roi>=2)  return hs>=7?"H":"C";
  if (roi>=-5) return hs>=8?"H":hs>=6?"H":"C";
  return hs>=9?"H":"D";
}

function getVerdict(roi, net, hs=0, h=null) {
  if (roi===null) return { v1:"IN STOCK", v2:"No eBay market data yet — check manually" };
  if (roi>=25)   return { v1:`${roi}% ROI — FIRE DEAL`, v2:`+£${net?.toFixed(2)} profit after eBay 13% + £4 post` };
  if (roi>=15)   return { v1:`${roi}% ROI — STRONG BUY`, v2:`+£${net?.toFixed(2)} after all fees. Pull the trigger.` };
  if (roi>=8)    return { v1:`${roi}% ROI — GOOD DEAL`, v2:`+£${net?.toFixed(2)} profit. Solid flip opportunity.` };
  if (roi>=2)    return { v1:`MARGINAL FLIP`, v2:`+£${net?.toFixed(2)} — slim profit only. Only buy if you want it.` };
  // Negative ROI — hold score decides
  if (hs>=8)     return { v1:`BUY & HOLD`, v2:`Not worth flipping (−£${Math.abs(net)?.toFixed(2)}) but strong ${hs}/10 hold score. Store sealed.` };
  if (hs>=6)     return { v1:`HOLD CANDIDATE`, v2:`Weak flip (−£${Math.abs(net)?.toFixed(2)}) but hold score ${hs}/10. Consider long term.` };
  if (roi>=-10)  return { v1:`SLIM LOSS`, v2:`−£${Math.abs(net)?.toFixed(2)} after fees. Weak hold too. Only buy to open.` };
  return           { v1:`AVOID`, v2:`−£${Math.abs(net)?.toFixed(2)} loss after eBay fees. Not worth it.` };
}

function getPtype(t) {
  const l = t.toLowerCase();
  if (l.includes("booster box") && !l.includes("half")) return { l:"BOX",    c:"#FF3B3B" };
  if (l.includes("half"))                               return { l:"½ BOX",  c:"#FF8C00" };
  if (l.includes("elite trainer") || l.includes("etb"))return { l:"ETB",    c:"#B388FF" };
  if (l.includes("booster bundle"))                    return { l:"BUNDLE", c:"#FF8C00" };
  if (l.includes("booster pack"))                      return { l:"PACK",   c:"#38B6FF" };
  if (l.includes("tin"))                               return { l:"TIN",    c:"#00CCC0" };
  if (l.includes("blister"))                           return { l:"BLISTER",c:"#00CCC0" };
  if (l.includes("collection"))                        return { l:"COLL.",  c:"#C44DFF" };
  if (l.includes("deck"))                              return { l:"DECK",   c:"#39D98A" };
  return { l:"SEALED", c:"#8899AA" };
}

function packCost(title, price) {
  const t = title.toLowerCase();
  if (t.includes("booster box") && !t.includes("half")) return +(price/36).toFixed(2);
  if (t.includes("half")) return +(price/18).toFixed(2);
  if (t.includes("bundle")) return +(price/6).toFixed(2);
  return null;
}

function ago(iso) {
  const m = Math.floor((Date.now()-new Date(iso))/60000);
  return m<1?"now":m<60?`${m}m`:`${Math.floor(m/60)}h`;
}

  const vsR = d.rrp    ? Math.round((d.buyNow-d.rrp)/d.rrp*100)      : null;
  const tc  = h?.trend==="rising"?"#39D98A":h?.trend==="declining"?"#FF3B3B":"#FF8C00";
  const DISP = "'Rajdhani', sans-serif";
  const MONO = "'Share Tech Mono', 'Courier New', monospace";
  const SUB  = "'Rajdhani', 'Arial', sans-serif";

  return (
    <div onClick={()=>setOpen(o=>!o)} style={{
      background:"#0C0C15",
      border:`1px solid ${open ? gr.border : "rgba(255,255,255,0.09)"}`,

      transition:"border-color 0.15s, box-shadow 0.15s",

  function InteractiveChart({ data, color, months }) {
    const [idx, setIdx] = React.useState(null);
    const svgRef = React.useRef(null);
    const validData = data.map((v,i) => ({v,i})).filter(x=>x.v!==null);
    if (validData.length < 2) return null;
    const vals = validData.map(x=>x.v);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const range = max - min || 1;
    const W = 320, H = 80;
    const xScale = i => (i / (data.length-1)) * W;
    const yScale = v => H - ((v-min)/range)*(H-12) - 6;

    // Build path only through non-null points
    const pts = validData.map(({v,i}) => `${xScale(i)},${yScale(v)}`).join(" ");
    const firstX = xScale(validData[0].i);
    const lastX  = xScale(validData[validData.length-1].i);

    function handleTouch(e) {
      const rect = svgRef.current?.getBoundingClientRect();
      if (!rect) return;
      const clientX = e.touches?.[0]?.clientX ?? e.clientX;
      const relX = (clientX - rect.left) / rect.width * W;
      // Find closest valid point
      let best = 0, bestDist = Infinity;
      validData.forEach(({i}) => {
        const d = Math.abs(xScale(i) - relX);
        if (d < bestDist) { bestDist=d; best=i; }
      });
      setIdx(best);
    }

    const activeVal = idx !== null && data[idx] !== null ? data[idx] : validData[validData.length-1].v;
    const activeMonth = idx !== null ? months[idx] : months[validData[validData.length-1].i];
    const startVal = validData[0].v;
    const pct = (((activeVal - startVal)/startVal)*100).toFixed(0);

    return (
      <div>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <div style={{ fontFamily:MONO, fontSize:9, color:"#555" }}>
            {activeMonth} — <span style={{ color:"#FFFFFF" }}>£{activeVal.toLocaleString()}</span>
          </div>
          <div style={{ fontFamily:MONO, fontSize:9, color:pct>=0?color:"#FF3B3B" }}>
            {pct>=0?"+":""}{pct}% from start
          </div>
        </div>
        <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", touchAction:"none", cursor:"crosshair" }}
          onMouseMove={handleTouch} onTouchMove={handleTouch}
          onMouseLeave={()=>setIdx(null)} onTouchEnd={()=>setIdx(null)}>
          <defs>
            <linearGradient id={`g${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          {/* Fill */}
          <polygon
            points={`${firstX},${H} ${pts} ${lastX},${H}`}
            fill={`url(#g${color.replace("#","")})`}
          />
          {/* Line */}
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Hover crosshair */}
          {idx !== null && data[idx] !== null && (
            <>
              <line x1={xScale(idx)} y1={0} x2={xScale(idx)} y2={H} stroke={color} strokeWidth="1" strokeDasharray="3,3" opacity="0.5"/>
              <circle cx={xScale(idx)} cy={yScale(data[idx])} r="4" fill={color} stroke="#07070D" strokeWidth="2"/>
            </>
          )}
          {/* Current price dot */}
          {(idx === null) && (
            <circle cx={lastX} cy={yScale(validData[validData.length-1].v)} r="3.5" fill={color} stroke="#07070D" strokeWidth="2"/>
          )}
        </svg>
        {/* Month axis — show 6 evenly spaced labels */}
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
          {[0,4,8,12,16,20,23].map(i=>(
            <span key={i} style={{ fontFamily:MONO, fontSize:7, color:"#333" }}>{months[i]}</span>
          ))}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
          <span style={{ fontFamily:MONO, fontSize:7, color:"#333" }}>Jun '24</span>
          <span style={{ fontFamily:MONO, fontSize:7, color:"#333" }}>May '26</span>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Search bar */}
      <input
        type="text"
        value={heatSearch}
        onChange={e=>setHeatSearch(e.target.value)}
        placeholder="Search e.g. '151 pack' or 'Evolving Skies'..."
        style={{ width:"100%", background:"#0F0F18", border:"1px solid #2A2A38", borderRadius:6, padding:"10px 14px", color:"#FFFFFF", fontFamily:MONO, fontSize:11, outline:"none", marginBottom:10 }}

            style={{ background:heatType===t?"#CC0000":"#161620", border:`1px solid ${heatType===t?"#CC0000":"#333345"}`, borderRadius:4, padding:"5px 10px", flexShrink:0, fontFamily:MONO, fontSize:9, color:heatType===t?"#fff":"#AAAAAA", cursor:"pointer", whiteSpace:"nowrap" }}>

          if (q && !`${s.n} ${s.type}`.toLowerCase().includes(q)) return false;
          return true;
        });

        if (filtered.length === 0) return (
          <div style={{ fontFamily:MONO, fontSize:11, color:"#444", textAlign:"center", padding:"32px 0" }}>
            No results for "{heatSearch}"
          </div>
        );

        return filtered.map(s => {
          const key = `${s.n}|${s.type}`;
          const validHistory = s.history.filter(v=>v!==null);
          if (validHistory.length < 2) return null;
          const currentPrice = validHistory[validHistory.length-1];
          const startPrice = validHistory[0];
          const totalGain = (((currentPrice-startPrice)/startPrice)*100).toFixed(0);
          const tC = s.t==="rising"?"#39D98A":s.t==="declining"?"#FF3B3B":"#FF8C00";
          const isOpen = expanded === key;

        });

      <div style={{ fontFamily:MONO, fontSize:8, color:"#2A2A38", textAlign:"center", marginTop:16, paddingBottom:8 }}>

  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {

  function checkAlerts(deals) {
    if (!alerts.length) return;
    const hits = [];
    for (const alert of alerts) {
      const keyword = alert.product.toLowerCase().trim();
      const max = parseFloat(alert.maxPrice);
      const match = deals.find(d =>
        d.product.toLowerCase().includes(keyword) &&
        d.buyNow <= max
      );
      if (match) hits.push({ deal: match, alert });
    }
    if (hits.length > 0) {
      setTriggered(hits);
      setAlertBanner(hits[0]);
      setTimeout(() => setAlertBanner(null), 8000);
    }
  }

      const r = await fetch(`${DEALS_URL}?t=${Date.now()}`);

    ];

    for (let i = 0; i < MAX_POLLS; i++) {
      // Cycle through retailer names every 3 seconds within each 15s poll
      const retailerIdx = (i * 5) % RETAILER_NAMES.length;
      for (let j = 0; j < 5; j++) {
        const name = RETAILER_NAMES[(retailerIdx + j) % RETAILER_NAMES.length];
        setScanProgress({ active:true, retailer:name, found:0, total:RETAILER_NAMES.length });

        const r = await fetch(`${DEALS_URL}?t=${Date.now()}`);
        if (r.ok) {
          const data = await r.json();
          if (Array.isArray(data) && data.length > 0) {
            const newTimestamp = data[0].lastSeen || "";
            if (newTimestamp !== previousTimestamp) {
              // Fresh data arrived!
              setDeals(data);
              setLive(true);
              setUpdated(new Date());
              setLoading(false);
              checkAlerts(data);
              setScanProgress({ active:false, retailer:"", found:data.length, total:0 });
              setPulse(false);
              gotFresh = true;
              break;
            }
          }
        }
      } catch {}
    }

    if (!gotFresh) {
      // Timed out — still show existing data
      setScanProgress({ active:false, retailer:"", found:0, total:0 });
      setPulse(false);
      load(); // fetch whatever is current
    }

    return () => clearInterval(i);

  // ── PASSWORD GATE (conditional render, no hooks below this) ──────────────

  function scoreEbayListing(item) {
    let score = 50; // base
    const market = getMarket(item.title);
    if (!market) return { score:50, signals:[] };
    const signals = [];
    const pctBelow = market > 0 ? Math.round((market - item.price) / market * 100) : 0;

    // Price vs market
    if (pctBelow >= 20)     { score += 30; signals.push({ l:"🔥 Hot price", c:"#00FF88" }); }
    else if (pctBelow >= 10){ score += 18; signals.push({ l:"↓ Below market", c:"#39D98A" }); }
    else if (pctBelow >= 0) { score += 8;  signals.push({ l:"≈ Market price", c:"#FFD60A" }); }
    else                    { score -= 15; signals.push({ l:"↑ Above market", c:"#FF3B3B" }); }

    // Recently listed
    if (item.hoursOld !== undefined && item.hoursOld < 3)  { score += 10; signals.push({ l:"🆕 Just listed", c:"#38B6FF" }); }
    else if (item.hoursOld < 12)                            { score += 5;  signals.push({ l:"New listing", c:"#38B6FF" }); }

    // Ending soon (auctions)
    if (item.endingSoon)  { score += 8; signals.push({ l:"⏱ Ending soon", c:"#FF8C00" }); }

    // Buy it now vs auction
    if (item.buyItNow)    { score += 5; signals.push({ l:"BIN available", c:"#B0B0B0" }); }

    // Low competition
    if (item.watchers !== undefined && item.watchers < 3) { score += 5; signals.push({ l:"Low competition", c:"#B388FF" }); }

    // Trusted seller
    if (item.feedbackPct >= 99 && item.feedbackCount >= 100) { score += 7; signals.push({ l:"⭐ Trusted seller", c:"#FFD60A" }); }

    return { score: Math.min(100, Math.max(0, score)), signals, pctBelow, market };
  }

            <div style={{ background:"#0A0A10", border:"1px solid rgba(255,255,255,0.07)", borderRadius:8, padding:"16px", marginBottom:10 }}>
              <div style={{ fontFamily:DISP, fontSize:12, fontWeight:500, color:"#FFFFFF", marginBottom:14, letterSpacing:"0.06em" }}>TOP FLIP PLAYS</div>
              {sorted.filter(d=>(calcFlip(d.buyNow,d.resell).net??-999)>0).slice(0,5).map((d,i)=>{
                const{net:n,roi:r}=calcFlip(d.buyNow,d.resell);
                return (
                  <div key={d.id||i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                    <div style={{ flex:1,minWidth:0,marginRight:12 }}>
                      <div style={{ fontFamily:DISP,fontSize:12,fontWeight:500,color:"#FFFFFF",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"0.02em" }}>{d.product}</div>
                      <div style={{ fontFamily:MONO,fontSize:9,color:"#C0C0C0",marginTop:2 }}>{d.retailer} · £{d.buyNow.toFixed(2)}</div>
                    </div>
                    <div style={{ textAlign:"right",flexShrink:0 }}>
                      <div style={{ fontFamily:DISP,fontSize:12,fontWeight:500,color:"#00FF88" }}>+£{n.toFixed(2)}</div>
                      <div style={{ fontFamily:MONO,fontSize:9,color:"#C0C0C0" }}>{r}% ROI</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Best holds */}
            <div style={{ background:"#0A0A10", border:"1px solid rgba(255,255,255,0.07)", borderRadius:8, padding:"16px" }}>
              <div style={{ fontFamily:DISP, fontSize:12, fontWeight:500, color:"#FFFFFF", marginBottom:14, letterSpacing:"0.06em" }}>BEST HOLD PLAYS</div>
              {sorted.filter(d=>{const h=calcHold(d.resell,d.product);return h&&h.score>=7;}).slice(0,5).map((d,i)=>{
                const h=calcHold(d.resell,d.product);
                return (
                  <div key={d.id||i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                    <div style={{ flex:1,minWidth:0,marginRight:12 }}>
                      <div style={{ fontFamily:DISP,fontSize:12,fontWeight:500,color:"#FFFFFF",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"0.02em" }}>{d.product}</div>
                      <div style={{ fontFamily:MONO,fontSize:9,color:"#C0C0C0",marginTop:2 }}>{d.retailer} · SCORE {h?.score}/10</div>
                    </div>
                    <div style={{ textAlign:"right",flexShrink:0 }}>
                      <div style={{ fontFamily:DISP,fontSize:12,fontWeight:500,color:"#39D98A" }}>+{h?.yr1pct}% YR1</div>
                      <div style={{ fontFamily:DISP,fontSize:12,fontWeight:500,color:"#39D98A" }}>+{h?.yr2pct}% YR2</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── SHOPS ── */}
        {tab==="shops"&&(
          <div style={{animation:"fadeup 0.3s ease"}}>
            <div style={{ fontFamily:MONO,fontSize:9,color:"#B0B0B0",marginBottom:14,letterSpacing:"0.12em" }}>16 UK RETAILERS · SCANNED EVERY 10 MINUTES</div>
            {[
              ["Total Cards","https://totalcards.net"],["Titan Cards","https://titancards.co.uk"],
              ["Eterna Cards","https://eternacards.co.uk"],["PACKRAT","https://packratt.co.uk"],
              ["Double Sleeved","https://doublesleeved.co.uk"],["Toys N Geek","https://www.toysngeek.co.uk"],
              ["The Card Vault","https://thecardvault.co.uk"],["My TCG","https://mytcg.co.uk"],
              ["Gathering Games","https://gatheringgames.co.uk"],["Magic Madhouse","https://magicmadhouse.co.uk"],
              ["Japan2UK","https://japan2uk.com"],["Big Orbit Cards","https://www.bigorbitcards.co.uk"],
              ["Zatu Games","https://www.board-game.co.uk"],["Smyths","https://www.smythstoys.com"],
              ["Amazon UK","https://www.amazon.co.uk"],["Pokemon Center UK","https://www.pokemoncenter.com"],
            ].map(([name,url])=>(
              <a href={url} target="_blank" rel="noopener noreferrer" key={name}
                style={{ display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0A0A10",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"12px 14px",marginBottom:6 }}>
                <div>
                  <div style={{ fontFamily:DISP,fontSize:12,fontWeight:500,color:"#FFFFFF",letterSpacing:"0.03em" }}>{name}</div>
                  <div style={{ fontFamily:MONO,fontSize:9,color:"#B0B0B0",marginTop:2 }}>{url.replace("https://","")}</div>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                  <div style={{ width:7,height:7,borderRadius:"50%",background:"#00FF88",boxShadow:"0 0 8px #00FF88" }}/>
                  <span style={{ fontFamily:MONO,fontSize:9,color:"#00CC70" }}>ACTIVE</span>
                </div>
              </a>
            ))}
          </div>
        )}
      </div>
    </div>

    {/* ══ BOTTOM NAV ══ */}
    <div style={{ position:"fixed",bottom:0,left:0,right:0,background:"rgba(7,7,13,0.98)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",padding:"10px 0 24px",zIndex:100,backdropFilter:"blur(20px)" }}>
      {[{id:"deals",icon:"🏠",l:"HOME"},{id:"ebay",icon:"🛒",l:"EBAY"},{id:"heat",icon:"🔥",l:"HEAT"},{id:"alerts",icon:"🔔",l:"ALERTS"},{id:"market",icon:"🏷",l:"MARKET"}].map(n=>(
        <button key={n.id} onClick={()=>setTab(n.id)} style={{ flex:1,background:"transparent",border:"none",color:tab===n.id?"#CC0000":"#777",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:DISP,fontSize:11,fontWeight:500,letterSpacing:"0.1em",transition:"color 0.15s" }}>
          <span style={{ fontSize:19 }}>{n.icon}</span>{n.l}
        </button>
      ))}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
